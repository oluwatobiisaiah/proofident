name: Deploy ML Service

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - ".github/workflows/deploy-ml.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/oluwatobiisaiah/proofident-ml

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    # ML Docker build trains the model (scripts/train_model.py) — can take ~3 min
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ml
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://ml.proofident.idylabs.com
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4

      - name: Install Kamal
        run: sudo gem install kamal --version '~> 2.0'

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<'EOF'
          KAMAL_REGISTRY_PASSWORD=${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          EOF

      - name: Deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: kamal deploy --skip-push --config-file config/deploy.production.yml

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 10 \
            https://ml.proofident.idylabs.com/health
